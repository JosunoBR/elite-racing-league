    <style>
        /* Direção de texto LTR (Left-to-Right) */
        html, body, * {
            direction: ltr;
            unicode-bidi: embed;
        }
        input, textarea, select, button, [contenteditable="true"], .stage-points, .pilot-name, .stage-header, .grid-title {
            direction: ltr !important;
            unicode-bidi: embed !important;
            text-align: left !important;
        }

        body {
            background: linear-gradient(180deg, #111, #000);
            color: #fff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }
        .tab { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab button { background: var(--bg-dark, #111); border: 1px solid #333; padding: 10px 20px; cursor: pointer; color: #ccc; border-radius: 5px; transition: 0.3s; font-family: Arial, sans-serif; }
        .tab button.active { background: var(--primary-color, #e10600); color: #fff; font-weight: bold; }
        .tab button:hover { background: var(--primary-color, #e10600); color: #fff; }
        .tabcontent { display: none; padding: 20px; background-color: var(--bg-darker, #0b0b0b); border-radius: 10px; border: 1px solid #222; }
        h2 { color: #fff; text-align: center; font-size: 24px; margin-bottom: 20px; position: relative; }
        .grid-title { display: inline-block; min-width: 220px; padding: 4px 8px; border-radius: 6px; }
        .grid-title:focus, .stage-header:focus, .pilot-name:focus, .stage-points:focus { outline: 1px solid var(--primary-color, #e10600); background-color: #222; }
        .delete-grid { cursor: pointer; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 20px; }
        table { width: 100%; border-collapse: collapse; color: #fff; }
        th, td { border: 1px solid #222; padding: 8px; text-align: left; }
        th { background-color: #1a1a1a; color: #fff; border-bottom: 2px solid var(--primary-color, #e10600); text-transform: uppercase; font-size: 12px; }
        .stage-header { background-color: #222; }
        td { background-color: var(--bg-dark, #111); }
        .pilot-name, .pilot-team, .stage-points, .total-points { background-color: #151515; }
        .row-id-column { width: 40px; text-align: center; font-weight: bold; color: #e10600; }
        .pilot-photo-cell { width: 55px; text-align: center; }
        .pilot-photo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #333; cursor: pointer; transition: 0.3s; }
        .pilot-photo:hover { border-color: var(--primary-color, #e10600); transform: scale(1.1); }
        .actions-column { width: 50px; text-align: center; }
        .btn-delete-row { background: transparent; border: 1px solid #dc3545; color: #dc3545; padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .btn-delete-row:hover { background: #dc3545; color: #fff; }
        .manage-pilots-link { text-align: center; margin-bottom: 20px; padding: 10px; background: #1a1a1a; border-radius: 8px; }
        .manage-pilots-link a { color: #e10600; text-decoration: none; font-weight: bold; }
        .manage-pilots-link a:hover { text-decoration: underline; }
        .empty-photo { background: #222; display: flex; align-items: center; justify-content: center; color: #444; font-size: 16px; }

        /* Photo Editor Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background-color: #1e1e1e;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 500px;
            border-radius: 10px;
            text-align: center;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        #photoEditorPreview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e10600;
            margin: 0 auto 15px;
            display: block;
        }

        #photoEditorInput {
            margin-bottom: 15px;
        }

        #removePhotoButton, #savePhotoButton {
            background: #e10600;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }

        #removePhotoButton {
            background: #dc3545;
        }
    </style>
</head>

    <div id="photoEditorModal" class="modal">
    <div class="modal-content">

        <div id="photo-editor-content">
            <img id="photoEditorPreview" class="photo-preview" src="">
            <input type="file" id="photoEditorInput" accept="image/*">

        </div>
    </div>
</div>

    <script src="data/pilotos.js"></script>
    <script src="data/campeonato.js"></script>

    <script>document.addEventListener('DOMContentLoaded', function(){ Auth.updateNavLinks(); });</script>
    <script>
        function getTabButtonByGridId(gridId) { return document.querySelector(`.tablinks[data-grid-id="${gridId}"]`); }
        function getGridFallbackName(gridId) { return `Grid ${getGridNumber(gridId, 1)}`; }
        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(event) { resolve(event.target.result); };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function openGrid(evt, gridId) {
            document.querySelectorAll(".tabcontent").forEach(tabcontent => tabcontent.style.display = "none");
            document.querySelectorAll(".tablinks").forEach(tabButton => tabButton.classList.remove("active"));
            const targetGrid = document.getElementById(gridId);
            if (!targetGrid) return;
            targetGrid.style.display = "block";
            if (evt && evt.currentTarget) { evt.currentTarget.classList.add("active"); return; }
            const targetButton = getTabButtonByGridId(gridId);
            if (targetButton) targetButton.classList.add("active");
        }
        function openPhotoEditor(element) {
            const rowElement = element.closest('tr');
            let pilotId = rowElement.dataset.pilotId;
            let pilotName = rowElement.querySelector('.pilot-name').textContent.trim() || "Piloto";

            if (!pilotId) {
                pilotId = 'pilot_' + Date.now() + Math.floor(Math.random() * 1000);
                rowElement.dataset.pilotId = pilotId;
                pilotRegistry.register(pilotId, { nome: pilotName });
                saveCurrentGrids();
            }

            const modal = document.getElementById("photoEditorModal");
            const title = document.getElementById("photoEditorTitle");
            const preview = document.getElementById("photoEditorPreview");
            const input = document.getElementById("photoEditorInput");
            const removeButton = document.getElementById("removePhotoButton");
            const saveButton = document.getElementById("savePhotoButton");
            
            title.textContent = "Editar Foto de " + pilotName;
            const pilot = pilotRegistry.getById(pilotId);
            preview.src = pilot?.imagem || "fotosmenu/logo.png";
            input.value = "";

            removeButton.onclick = async function() {
                try {
                    if (typeof erlPersistence !== "undefined") {
                        await erlPersistence.removePilotPhoto(pilotId);
                    }
                    pilotRegistry.removeImage(pilotId);
                    updateRowPhotosById(pilotId);
                    closePhotoEditorModal();
                } catch (error) {
                    console.error(error);
                    alert("Nao foi possivel remover a foto do piloto.");
                }
            };

            saveButton.onclick = async function() {
                if (input.files && input.files[0]) {
                    try {
                        saveButton.disabled = true;
                        const imageDataUrl = await readFileAsDataURL(input.files[0]);
                        const uploadResult =
                            typeof erlPersistence !== "undefined"
                                ? await erlPersistence.uploadPilotPhoto(pilotId, imageDataUrl)
                                : { imagePath: imageDataUrl };
                        pilotRegistry.register(pilotId, { imagem: uploadResult.imagePath, nome: pilotName });
                        updateRowPhotosById(pilotId);
                        closePhotoEditorModal();
                    } catch (error) {
                        console.error(error);
                        alert("Nao foi possivel salvar a foto do piloto.");
                    } finally {
                        saveButton.disabled = false;
                    }
                } else {
                    closePhotoEditorModal();
                }
            };
            modal.style.display = "block";
        }

        function closePhotoEditorModal() {
            const modal = document.getElementById("photoEditorModal");
            modal.style.display = "none";
            saveCurrentGrids();
        }

        function updateButtonText(titleElement, gridId) {
            const normalizedTitle = titleElement.textContent.trim() || getGridFallbackName(gridId);
            const button = getTabButtonByGridId(gridId);
            // Só atualizar o botão, não reescrever o título (evita problemas com cursor)
            if (button) button.textContent = normalizedTitle;
        }

        function renderGridRow(row, rowIndex, gridId) {
            const etapas = Array.isArray(row.etapas) ? row.etapas : [];
            const pilotName = row.nome || "";
            const pilotImage = row.pilotId ? pilotRegistry.getImage(row.pilotId) : null;

            let stageCells = "";
            for (let stageIndex = 0; stageIndex < GRID_STAGE_COUNT; stageIndex++) {
                stageCells += `<td class="stage-points" contenteditable="true">${etapas[stageIndex] || ""}</td>`;
            }

            let photoHtml = pilotImage
                ? `<img src="${pilotImage}" class="pilot-photo" onclick="openPhotoEditor(this)" title="Editar foto">`
                : `<div class="pilot-photo empty-photo" onclick="openPhotoEditor(this)">?</div>`;

            return `
                <tr data-row-index="${rowIndex}" data-pilot-id="${row.pilotId || ''}">
                    <td class="row-id-column">${rowIndex + 1}</td>
                    <td class="pilot-photo-cell">${photoHtml}</td>
                    <td class="pilot-name" contenteditable="true">${escapeGridHtml(pilotName)}</td>
                    <td class="pilot-team-cell">
                        <select class="form-select form-select-sm pilot-team-select" style="background:#151515; color:white; border:none; width: 100%; padding: 4px 8px;">
                            <option value=""></option>
                            ${Object.keys(window.F1_TEAMS || {}).map(key => `<option value="${key}" ${String(row.equipe || "").toLowerCase() === key ? 'selected' : ''}>${window.F1_TEAMS[key]}</option>`).join('')}
                        </select>
                    </td>
                    ${stageCells}
                    <td class="total-points"></td>
                    <td class="actions-column">
                        <button class="btn-delete-row" onclick="deleteRow('${gridId}', ${rowIndex})" title="Excluir linha">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        }

        function deleteRow(gridId, rowIndex) {
            if (!confirm("Deseja realmente excluir esta linha?")) return;
            const gridElement = document.getElementById(gridId);
            if (!gridElement) return;
            const rows = Array.from(gridElement.querySelectorAll("tbody tr"));
            if (rowIndex >= 0 && rowIndex < rows.length) {
                rows[rowIndex].remove();
                Array.from(gridElement.querySelectorAll("tbody tr")).forEach((row, idx) => {
                    row.dataset.rowIndex = idx;
                    row.querySelector(".row-id-column").textContent = idx + 1;
                    row.querySelector(".btn-delete-row").setAttribute("onclick", `deleteRow('${gridId}', ${idx})`);
                });
                saveCurrentGrids(); updateTotalPoints();
            }
        }

        function createGridContent(grid) {
            const tabContent = document.createElement("div");
            const headers = Array.isArray(grid.headers) ? grid.headers : createDefaultGridHeaders();
            const rows = Array.isArray(grid.rows) ? grid.rows : [];
            let stageHeaders = "";
            headers.forEach(header => { stageHeaders += `<th class="stage-header" contenteditable="true">${header}</th>`; });
            let bodyRows = "";
            rows.forEach((row, index) => { bodyRows += renderGridRow(row, index, grid.id); });
            tabContent.id = grid.id;
            tabContent.className = "tabcontent";
            tabContent.innerHTML = `
                <h2>
                    <span class="grid-title" contenteditable="true" data-grid-id="${grid.id}">${grid.name || getGridFallbackName(grid.id)}</span>
                    <span class="delete-grid" onclick="deleteGrid('${grid.id}')">&#10060;</span>
                </h2>
                <table>
                    <thead>
                        <tr>
                            <th class="row-id-column">#</th>
                            <th class="pilot-photo-cell">Foto</th>
                            <th>Nome</th>
                            <th>Equipe</th>
                            ${stageHeaders}
                            <th>Total</th>
                            <th class="actions-column"></th>
                        </tr>
                    </thead>
                    <tbody>${bodyRows}</tbody>
                </table>
            `;
            return tabContent;
        }

        function createTabButton(grid) {
            const button = document.createElement("button");
            button.type = "button"; button.className = "tablinks"; button.dataset.gridId = grid.id;
            button.textContent = grid.name || getGridFallbackName(grid.id);
            button.onclick = (event) => openGrid(event, grid.id);
            return button;
        }

        function collectGridData() {
            return Array.from(document.querySelectorAll("#grid-tabs .tablinks")).map(button => {
                const gridId = button.dataset.gridId;
                const gridElement = document.getElementById(gridId);
                const titleElement = gridElement.querySelector(".grid-title");
                const gridName = titleElement.textContent.trim() || getGridFallbackName(gridId);
                const headers = Array.from(gridElement.querySelectorAll(".stage-header")).map((h, i) => h.textContent.trim() || `Etapa ${i + 1}`);
                const rows = Array.from(gridElement.querySelectorAll("tbody tr")).map(rowElement => {
                    const etapas = Array.from(rowElement.querySelectorAll(".stage-points")).map(cell => {
                        // Lê e sanitiza sem escrever de volta no DOM (evita reset de cursor)
                        return sanitizeGridNumericValue(cell.textContent);
                    });
                    return {
                        pilotId: rowElement.dataset.pilotId || '',
                        nome: rowElement.querySelector(".pilot-name").textContent.trim(),
                        equipe: rowElement.querySelector(".pilot-team-select").value,
                        etapas
                    };
                });
                // Não reescrever titleElement aqui - evita problemas com edição contenteditable
                button.textContent = gridName;
                return { id: gridId, name: gridName, headers, rows };
            });
        }

        function saveCurrentGrids() { 
          saveEditableGrids(collectGridData()); 
          // Notificar outras abas e mesma aba sobre atualização
          window.dispatchEvent(new CustomEvent('gridUpdated', {
            detail: { timestamp: new Date().toISOString(), source: 'grid_edit' }
          }));
        }

        function updateTotalPoints() {
            document.querySelectorAll("#grid-container tbody tr").forEach(rowElement => {
                const total = Array.from(rowElement.querySelectorAll(".stage-points")).reduce((acc, cell) => {
                    const parsedValue = parseFloat(String(cell.textContent || "").replace(",", "."));
                    return acc + (Number.isFinite(parsedValue) ? parsedValue : 0);
                }, 0);
                rowElement.querySelector(".total-points").textContent = total;
            });
        }

        function updateRowPhotosById(pilotId) {
            if (!pilotId) return;
            const pilotImage = pilotRegistry.getImage(pilotId);

            document.querySelectorAll(`tr[data-pilot-id="${pilotId}"]`).forEach(row => {
                const photoCell = row.querySelector(".pilot-photo-cell");
                if (!photoCell) return;
                photoCell.innerHTML = pilotImage
                    ? `<img src="${pilotImage}" class="pilot-photo" onclick="openPhotoEditor(this)" title="Editar foto">`
                    : `<div class="pilot-photo empty-photo" onclick="openPhotoEditor(this)">?</div>`;
            });
        }

        function renderEditableGrids(grids = loadEditableGrids(), activeGridId = null) {
            const normalizedGrids = normalizeEditableGrids(grids);
            const tabContainer = document.getElementById("grid-tabs");
            const addGridButton = document.getElementById("add-grid-button");
            const gridContainer = document.getElementById("grid-container");
            tabContainer.querySelectorAll(".tablinks").forEach(b => b.remove());
            gridContainer.innerHTML = "";
            normalizedGrids.forEach(grid => {
                tabContainer.insertBefore(createTabButton(grid), addGridButton);
                gridContainer.appendChild(createGridContent(grid));
            });
            const targetButton = getTabButtonByGridId(activeGridId) || tabContainer.querySelector(".tablinks");
            if (targetButton) targetButton.click();
            updateTotalPoints();
        }

        function deleteGrid(gridId) {
            if (!confirm("Tem certeza que deseja excluir este grid?")) return;
            saveEditableGrids(collectGridData().filter(g => g.id !== gridId));
            renderEditableGrids();
        }

        function createNewGrid() {
            const currentGrids = collectGridData();
            const nextGridNumber = currentGrids.reduce((max, g) => Math.max(max, getGridNumber(g.id, 0)), 0) + 1;
            const newGridId = `grid${nextGridNumber}`;
            const newGrid = {
                id: newGridId, name: `Grid ${nextGridNumber}`,
                headers: createDefaultGridHeaders(),
                rows: Array.from({ length: GRID_DEFAULT_ROWS }, () => ({ nome: "", equipe: "", etapas: Array(GRID_STAGE_COUNT).fill("") }))
            };
            const savedGrids = saveEditableGrids([...currentGrids, newGrid]);
            renderEditableGrids(savedGrids, newGridId);
        }

        document.addEventListener("DOMContentLoaded", function () {
            renderEditableGrids();

            document.getElementById("grid-container").addEventListener("input", function (e) {
                const target = e.target;
                if (target.classList.contains("pilot-name")) {
                    const pilotName = target.textContent.trim();
                    const rowElement = target.closest('tr');
                    if (rowElement) {
                        const pilotId = pilotRegistry.findIdByName(pilotName);
                        rowElement.dataset.pilotId = pilotId || '';

                        // Atualiza a célula da foto na linha atual
                        const photoCell = rowElement.querySelector('.pilot-photo-cell');
                        if (photoCell) {
                            const pilotImage = pilotId ? pilotRegistry.getImage(pilotId) : null;
                            photoCell.innerHTML = pilotImage
                                ? `<img src="${pilotImage}" class="pilot-photo" onclick="openPhotoEditor(this)" title="Editar foto">`
                                : `<div class="pilot-photo empty-photo" onclick="openPhotoEditor(this)">?</div>`;
                        }
                    }
                    saveCurrentGrids(); 
                    return;
                }
                if (target.classList.contains("stage-points")) {
                    saveCurrentGrids(); updateTotalPoints(); return;
                }
                if (target.classList.contains("grid-title")) { saveCurrentGrids(); }
                if (target.classList.contains("stage-header")) saveCurrentGrids();
            });

            document.getElementById("grid-container").addEventListener("change", function(e) {
                if (e.target.classList.contains('pilot-team-select')) saveCurrentGrids();
            });

            document.getElementById("grid-container").addEventListener("blur", function (e) {
                const target = e.target;
                if (target.classList.contains("grid-title")) {
                    // Só sincroniza o botão quando termina a edição (no blur)
                    updateButtonText(target, target.dataset.gridId);
                }
                // Sanitiza pontos ao sair da célula (sem interferir no cursor durante digitação)
                if (target.classList.contains("stage-points")) {
                    const sanitized = sanitizeGridNumericValue(target.textContent);
                    if (target.textContent !== sanitized) target.textContent = sanitized;
                }
                saveCurrentGrids();
            }, true);
        });
    </script>
